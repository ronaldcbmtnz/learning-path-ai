# Tema oscuro "tech/IA": azul profundo + azul cielo.
# Estos colores fijan los widgets nativos de Streamlit; el resto del look
# (gradientes, tarjetas glassmorphism, badges) se inyecta por CSS en src/ui.py.
[theme]
base = "dark"
primaryColor = "#38bdf8"            # azul cielo (acentos, botones, sliders)
backgroundColor = "#0a1929"         # azul profundo (fondo principal)
secondaryBackgroundColor = "#0f2744" # azul medio (sidebar, inputs, tarjetas)
textColor = "#e2e8f0"               # gris muy claro
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
